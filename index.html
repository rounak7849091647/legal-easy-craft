    <!-- Structured Data - Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "LegalCareAI",
      "url": "https://legalcareai.com",
      "logo": "https://legalcareai.com/favicon.png",
      "description": "AI-powered legal intelligence platform providing instant legal guidance for Indian law including BNS, IPC, Civil Law, and Tax Services.",
      "sameAs": ["https://twitter.com/LegalCareAI"],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "availableLanguage": ["English", "Hindi", "Tamil", "Telugu", "Bengali", "Marathi", "Gujarati"]
      },
      "areaServed": {
        "@type": "Country",
        "name": "India"
      }
    }
    </script>

    <!-- Structured Data - WebSite with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "LegalCareAI",
      "url": "https://legalcareai.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://legalcareai.com/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data - SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
